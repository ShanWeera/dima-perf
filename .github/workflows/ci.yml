name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust checks (core library + Tauri backend)
  rust:
    name: Rust (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        if: matrix.check == 'test'
        run: cargo test --workspace --locked

      - name: cargo clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --workspace --locked -- -D warnings

      - name: cargo fmt
        if: matrix.check == 'fmt'
        run: cargo fmt --all -- --check

  # CLI-only checks (benchmarks compile, MSRV, macOS)
  cli:
    name: CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run CLI tests
        run: cargo test -p dima --locked

      - name: Compile benchmarks (regression check)
        run: cargo bench --no-run --locked -p dima

  # MSRV check — ensures declared rust-version is actually buildable
  msrv:
    name: MSRV (1.81)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81"

      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV compiles
        run: cargo check -p dima --locked

  # Frontend checks (TypeScript + lint)
  frontend:
    name: Frontend (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

      - name: ESLint
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Vitest
        if: matrix.check == 'test'
        run: npx vitest run

      - name: Production build
        if: matrix.check == 'typecheck'
        run: npm run build
